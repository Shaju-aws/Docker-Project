name: roboshop
services:
  mongodb:
    build: ./MongoDB
    image: shajuawsdocker/mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./Catalogue
    image: shajuawsdocker/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  Frontend:
    build: ./Frontend
    image: shajuawsdocker/frontend:v1
    container_name: frontend
    ports:
      - 80:80
    depends_on:
      - catalogue
      - user

  redis:
    build: ./redis
    image: shajuawsdocker/redis:v1
    container_name: redis
  user:
    build: ./user
    image: shajuawsdocker/user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
  cart:
    build: ./cart
    image: shajuawsdocker/cart:v1
    container_name: cart
    environment:
      - REDIS_HOST=redis
      - CATALOGUE_HOST=catalogue
      - CATALOGUE_PORT=8080
    depends_on:
      - redis
      - catalogue
  mysql:
    build: ./mysql
    image: shajuawsdocker/mysql:v1
    container_name: mysql
    command: --mysql-native-password=ON --innodb-lock_wait_timeout=120
    environment:
      MYSQL_ROOT_PASSWORD: RoboShop@1